name: Deploy
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        #run: |
          #echo "Cloning repository"
          #echo "${{toJson(github)}}"
          #git clone https://github.com/${{github.repository}}.git my-project
          #cd my-project
          #ls -lt
      - name: Set up node
        uses: actions/setup-node@v4
        with: 
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up node
        uses: actions/setup-node@v4
        with: 
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build project
        run: npm run build
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: echo 'Deployment completed'